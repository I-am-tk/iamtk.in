services:
    web:
        build:
            args:
                NODE_VERSION: 24-bookworm-slim
                NODE_MAJOR: 24
            context: .
            dockerfile: Dockerfile
            target: runner
        image: iamtk-in:latest
        init: true
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            - .env
        read_only: true
        cap_drop:
            - ALL
        security_opt:
            - no-new-privileges:true
        tmpfs:
            - /tmp
        volumes:
            - next-cache:/app/.next/cache

volumes:
    next-cache:
